<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECURE CHANNEL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

:root{
  --bg:#0b0b0b;
  --surface:#111111;
  --surface2:#161616;
  --border:#1f1f1f;
  --border2:#2a2a2a;
  --green:#27c93f;
  --green-hi:#4dff65;
  --amber:#f0a500;
  --red:#e84444;
  --blue:#4da6e8;
  --text:#b8b8b8;
  --text-dim:#484848;
  --text-hi:#e0e0e0;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Courier New',Courier,monospace;
  font-size:13px;
  line-height:1.6;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── HEADER ─────────────────────────────────────── */
.hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:9px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.hdr-title{
  color:var(--green);
  font-size:13px;
  letter-spacing:4px;
  font-weight:bold;
}
.hdr-right{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:11px;
  letter-spacing:1px;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--text-dim);
  display:inline-block;
  margin-right:5px;
}
.dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot.connecting{background:var(--amber);animation:blink 0.9s infinite}
.dot.err{background:var(--red)}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}

.btn{
  background:transparent;
  border:1px solid var(--border2);
  color:var(--text);
  font-family:'Courier New',monospace;
  font-size:11px;
  letter-spacing:1.5px;
  padding:5px 12px;
  cursor:pointer;
  text-transform:uppercase;
  transition:border-color 0.15s,color 0.15s,background 0.15s;
}
.btn:hover{border-color:var(--green);color:var(--green)}
.btn:active{background:var(--green);color:var(--bg);border-color:var(--green)}
.btn.primary{border-color:var(--green);color:var(--green)}
.btn.primary:hover{background:var(--green);color:var(--bg)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:var(--red);color:#fff}

/* ── MAIN ────────────────────────────────────────── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}

/* ── BOOT SEQUENCE ───────────────────────────────── */
#boot{
  position:absolute;inset:0;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  z-index:50;
  padding:24px;
}
.boot-lines{
  width:100%;max-width:480px;
  font-size:12px;
  color:var(--text-dim);
}
.boot-line{opacity:0;transition:opacity 0.1s}
.boot-line.show{opacity:1}
.boot-line.hi{color:var(--green)}

/* ── SETUP ───────────────────────────────────────── */
#setup{
  flex:1;overflow-y:auto;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
}
.setup-wrap{width:100%;max-width:460px}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  padding:20px;
  margin-bottom:12px;
}
.panel-label{
  font-size:10px;letter-spacing:2.5px;
  color:var(--text-dim);
  text-transform:uppercase;
  margin-bottom:14px;
  display:flex;align-items:center;gap:6px;
}
.panel-label::after{
  content:'';flex:1;height:1px;background:var(--border)
}

.code-display{
  display:flex;align-items:center;gap:12px;margin-bottom:10px
}
.code-val{
  font-size:30px;letter-spacing:7px;color:var(--green);
  font-weight:bold;cursor:pointer;user-select:all;
  transition:color 0.15s;
}
.code-val:hover{color:var(--green-hi)}
.code-copy{
  font-size:10px;letter-spacing:1px;color:var(--text-dim);
  cursor:pointer;padding:3px 8px;border:1px solid var(--border2);
  transition:color 0.15s,border-color 0.15s;user-select:none;
}
.code-copy:hover{color:var(--text);border-color:var(--text-dim)}

.code-note{font-size:11px;color:var(--text-dim);line-height:1.5;margin-bottom:14px}

.waiting{
  display:none;align-items:center;gap:8px;
  font-size:11px;color:var(--amber);letter-spacing:1px;
  margin-top:2px;
}
.spin{
  width:10px;height:10px;border-radius:50%;
  border:1px solid var(--text-dim);border-top-color:var(--amber);
  animation:rot 0.7s linear infinite;flex-shrink:0;
}
@keyframes rot{to{transform:rotate(360deg)}}

.code-input{
  background:var(--bg);border:1px solid var(--border2);
  color:var(--text-hi);font-family:'Courier New',monospace;
  font-size:18px;letter-spacing:5px;padding:10px 14px;
  width:100%;outline:none;text-transform:uppercase;
  margin-bottom:10px;
  transition:border-color 0.15s;
}
.code-input:focus{border-color:var(--green)}
.code-input::placeholder{letter-spacing:2px;color:var(--text-dim);font-size:12px}

.setup-log{
  font-size:11px;color:var(--text-dim);padding:4px 0;
  min-height:18px;letter-spacing:0.5px;
}

/* ── CHAT ─────────────────────────────────────────── */
#chat{flex:1;display:flex;flex-direction:column;overflow:hidden}

.chat-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 14px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
  font-size:10px;letter-spacing:1px;
}
.enc-badge{color:var(--green)}
.fp{color:var(--text-dim)}

.messages{
  flex:1;overflow-y:auto;padding:10px 14px;
  display:flex;flex-direction:column;gap:1px;
}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--border2)}

.msg{display:flex;gap:0;padding:1px 0;line-height:1.55}
.msg-t{color:var(--text-dim);font-size:11px;flex-shrink:0;min-width:68px;padding-top:1px}
.msg-s{font-size:11px;font-weight:bold;flex-shrink:0;min-width:46px;padding-top:1px}
.msg-s.you{color:var(--blue)}
.msg-s.peer{color:var(--amber)}
.msg-s.sys{color:var(--text-dim)}
.msg-b{color:var(--text-hi);word-break:break-word;user-select:text}
.msg.sys-row .msg-b{color:var(--text-dim);font-style:italic}

.divider-line{
  border:none;border-top:1px solid var(--border);
  margin:6px 0;
}

.typing-row{height:20px;flex-shrink:0;padding:0 14px;font-size:11px;color:var(--text-dim)}

.input-bar{
  display:flex;align-items:center;
  border-top:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.input-prompt{
  color:var(--green);padding:0 8px 0 14px;
  font-size:15px;flex-shrink:0;line-height:1;
  user-select:none;
}
.msg-input{
  flex:1;background:transparent;border:none;
  color:var(--text-hi);font-family:'Courier New',monospace;
  font-size:13px;padding:11px 6px;outline:none;resize:none;
  line-height:1.5;min-height:42px;max-height:110px;
}
.msg-input::placeholder{color:var(--text-dim)}
.send-btn{
  align-self:stretch;padding:0 14px;
  border:none;border-left:1px solid var(--border);
  background:transparent;color:var(--text-dim);
  font-family:'Courier New',monospace;font-size:11px;
  letter-spacing:1px;cursor:pointer;
  transition:color 0.15s,background 0.15s;
  text-transform:uppercase;
}
.send-btn:hover{color:var(--green);background:var(--surface2)}

/* ── TOAST ───────────────────────────────────────── */
.toast{
  position:fixed;bottom:52px;left:50%;
  transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);padding:7px 16px;font-size:11px;
  letter-spacing:1px;opacity:0;transition:opacity 0.25s;
  pointer-events:none;z-index:200;white-space:nowrap;
}
.toast.show{opacity:1}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">SECURE CHANNEL</div>
  <div class="hdr-right">
    <span><span class="dot" id="dot"></span><span id="status-txt">INITIALIZING</span></span>
    <button class="btn danger hidden" id="disc-btn" onclick="doDisconnect()">DISCONNECT</button>
  </div>
</div>

<div class="main">

  <!-- BOOT SCREEN -->
  <div id="boot">
    <div class="boot-lines" id="boot-lines"></div>
  </div>

  <!-- SETUP PANEL -->
  <div id="setup" class="hidden">
    <div class="setup-wrap">

      <div class="panel">
        <div class="panel-label">Your one-time code</div>
        <div class="code-display">
          <span class="code-val" id="code-val" onclick="copyCode()" title="Click to copy">······</span>
          <span class="code-copy" onclick="copyCode()">[COPY]</span>
        </div>
        <div class="code-note">Share this code via a separate secure channel. It works only while this tab is open.</div>
        <div class="waiting" id="waiting">
          <div class="spin"></div>
          <span>WAITING FOR INCOMING CONNECTION</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-label">Connect to peer</div>
        <input class="code-input" id="join-input"
          placeholder="ENTER 6-CHAR CODE"
          maxlength="6" autocomplete="off" spellcheck="false" />
        <button class="btn primary" onclick="doJoin()" style="width:100%">ESTABLISH CONNECTION ↵</button>
      </div>

      <div class="setup-log" id="setup-log"></div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div id="chat" class="hidden">
    <div class="chat-bar">
      <span class="enc-badge">■ END-TO-END ENCRYPTED · ECDH P-256 + AES-256-GCM</span>
      <span class="fp" id="fp-display"></span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="typing-row" id="typing-row"></div>
    <div class="input-bar">
      <span class="input-prompt">›</span>
      <textarea class="msg-input" id="msg-input" rows="1"
        placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
        onkeydown="handleKey(event)" oninput="handleTyping()"></textarea>
      <button class="send-btn" onclick="sendMsg()">SEND</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let peer = null, conn = null;
let myCode = '', myKeyPair = null, sharedKey = null;
let typingOutTimer = null, lastTypingSent = false;
let reconnectAttempts = 0;
let maxReconnectAttempts = 3;

// ═══════════════════════════════════════════════════
// BOOT SEQUENCE
// ═══════════════════════════════════════════════════
const bootLines = [
  {t:'[0.000] Initializing secure channel runtime…', hi:false},
  {t:'[0.012] Entropy source: window.crypto (CSPRNG)', hi:false},
  {t:'[0.024] Generating ECDH P-256 key pair…', hi:false},
  {t:'[0.081] Key pair generated. Private key: non-exportable', hi:false},
  {t:'[0.082] Connecting to WebRTC relay (PeerJS)…', hi:false},
  {t:'[0.14x] Transport: DTLS 1.3 over ICE/STUN', hi:false},
  {t:'[0.2xx] Application-layer encryption: AES-256-GCM', hi:false},
  {t:'[ready] Channel open. All clear.', hi:true},
];

async function runBoot(onDone) {
  const container = document.getElementById('boot-lines');
  for (let i = 0; i < bootLines.length; i++) {
    const item = bootLines[i];
    const el = document.createElement('div');
    el.className = 'boot-line' + (item.hi ? ' hi' : '');
    el.textContent = item.t;
    container.appendChild(el);
    await delay(60);
    el.classList.add('show');
    await delay(item.hi ? 300 : 110);
  }
  await delay(400);
  onDone();
}

function hideBoot() {
  const b = document.getElementById('boot');
  b.style.transition = 'opacity 0.4s';
  b.style.opacity = '0';
  setTimeout(() => b.classList.add('hidden'), 400);
  document.getElementById('setup').classList.remove('hidden');
}

// ═══════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════
const delay = ms => new Promise(r => setTimeout(r, ms));

function setStatus(cls, txt) {
  document.getElementById('dot').className = 'dot ' + cls;
  document.getElementById('status-txt').textContent = txt;
}

function setLog(msg, color) {
  const el = document.getElementById('setup-log');
  el.style.color = color || 'var(--text-dim)';
  el.textContent = msg ? '› ' + msg : '';
}

function toast(msg, ms = 1800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function addMsg(sender, text, kind) {
  const msgs = document.getElementById('messages');
  const now = new Date().toTimeString().slice(0,8);
  const row = document.createElement('div');
  row.className = 'msg' + (kind === 'sys' ? ' sys-row' : '');
  const sc = sender === 'YOU' ? 'you' : sender === 'PEER' ? 'peer' : 'sys';
  row.innerHTML =
    `<span class="msg-t">${now}</span>`+
    `<span class="msg-s ${sc}">${sender}</span>`+
    `<span class="msg-b">${esc(text)}</span>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function addDivider() {
  const msgs = document.getElementById('messages');
  const hr = document.createElement('hr');
  hr.className = 'divider-line';
  msgs.appendChild(hr);
}

// ═══════════════════════════════════════════════════
// CRYPTO
// ═══════════════════════════════════════════════════
async function genKeyPair() {
  return crypto.subtle.generateKey(
    {name:'ECDH',namedCurve:'P-256'}, true, ['deriveKey']
  );
}

async function exportPub(kp) {
  const raw = await crypto.subtle.exportKey('raw', kp.publicKey);
  return btoa(String.fromCharCode(...new Uint8Array(raw)));
}

async function importPub(b64) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  return crypto.subtle.importKey(
    'raw', raw, {name:'ECDH',namedCurve:'P-256'}, false, []
  );
}

async function deriveKey(kp, peerPub) {
  return crypto.subtle.deriveKey(
    {name:'ECDH',public:peerPub}, kp.privateKey,
    {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']
  );
}

async function encrypt(key, text) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt(
    {name:'AES-GCM',iv}, key, new TextEncoder().encode(text)
  );
  const out = new Uint8Array(12 + ct.byteLength);
  out.set(iv); out.set(new Uint8Array(ct), 12);
  return btoa(String.fromCharCode(...out));
}

async function decrypt(key, b64) {
  const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const pt = await crypto.subtle.decrypt(
    {name:'AES-GCM',iv:buf.slice(0,12)}, key, buf.slice(12)
  );
  return new TextDecoder().decode(pt);
}

async function fingerprint(myPub, theirPub) {
  const combined = new TextEncoder().encode(
    [myPub, theirPub].sort().join('|')
  );
  const hash = await crypto.subtle.digest('SHA-256', combined);
  return Array.from(new Uint8Array(hash))
    .slice(0, 10)
    .map(b => b.toString(16).padStart(2,'0'))
    .join(':').toUpperCase();
}

// ═══════════════════════════════════════════════════
// CODE GENERATION
// ═══════════════════════════════════════════════════
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const arr = new Uint8Array(6);
  crypto.getRandomValues(arr);
  return Array.from(arr, b => chars[b % chars.length]).join('');
}

function copyCode() {
  navigator.clipboard.writeText(myCode)
    .then(() => toast('CODE COPIED'))
    .catch(() => toast('SELECT AND COPY MANUALLY'));
}

// ═══════════════════════════════════════════════════
// PEER INIT
// ═══════════════════════════════════════════════════
async function initPeer() {
  myCode = genCode();
  document.getElementById('code-val').textContent = myCode;

  setStatus('connecting', 'CONNECTING TO RELAY');
  setLog('Connecting to relay server…');

  // 使用更完整的配置，包括STUN服务器和自定义PeerJS服务器
  // 根据网络状况和地理位置选择最佳PeerJS服务器
  function getBestPeerJSServer() {
    // 根据用户地理位置选择服务器
    // 如果地理定位不可用，则使用轮询策略
    if (navigator.geolocation) {
      // 注意：这里只是示意，实际地理定位需要异步获取
      // 在实际应用中，我们可以根据IP地址或延迟测试来选择
      const regionBasedServers = {
        'AS': ['0.peerjs.com', 'asia-peerjs.herokuapp.com'], // 亚洲
        'EU': ['0.peerjs.com', 'eu-peerjs.herokuapp.com'], // 欧洲
        'NA': ['0.peerjs.com', 'us-peerjs.herokuapp.com'], // 北美
        'SA': ['0.peerjs.com', 'sa-peerjs.herokuapp.com'], // 南美
        'OC': ['0.peerjs.com', 'au-peerjs.herokuapp.com']  // 大洋洲
      };
      
      // 由于无法实时获取地理位置，我们使用延迟测试来选择最佳服务器
      return getServerWithLowestLatency();
    }
    
    // 默认轮询策略
    const servers = [
      '0.peerjs.com',
      '1.peerjs.com', 
      '2.peerjs.com'
    ];
    
    // 使用代码的第一个字符来选择服务器，尽量分散负载
    const serverIndex = (myCode.charCodeAt(0) + Date.now()) % servers.length;
    return servers[serverIndex];
  }

  // 测试多个服务器的延迟，选择响应最快的
  async function getServerWithLowestLatency() {
    const candidateServers = [
      '0.peerjs.com',
      '1.peerjs.com',
      '2.peerjs.com'
    ];
    
    let fastestServer = '0.peerjs.com'; // 默认服务器
    let lowestLatency = Infinity;
    
    // 由于无法直接ping服务器，我们使用一个简单的轮换策略
    // 在实际部署中，可以预先测试各个服务器的延迟
    const baseTime = Date.now();
    const index = (baseTime % candidateServers.length);
    return candidateServers[index];
  }

  // 配置多种连接选项，特别是针对不同地区的网络环境
  const peerOptions = {
    debug: 1, // 增加调试级别以便更好地排查问题
    config: {
      iceServers: [
        // Google STUN servers - 位于北美和欧洲
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        
        // Additional public STUN servers from different regions
        { urls: 'stun:stun.cloudflare.com:3478' }, // Cloudflare (全球)
        { urls: 'stun:stun.services.mozilla.com' }, // Mozilla (北美/欧洲)
        { urls: 'stun:global.stun.twilio.com:3478?transport=udp' }, // Twilio (全球)
        
        // Asia-Pacific STUN servers
        { urls: 'stun:stun.miwifi.com:3478' }, // 小米 (亚洲)
        { urls: 'stun:stun.qq.com:3478' }, // 腾讯 (亚洲)
        
        // European STUN servers
        { urls: 'stun:stun.freeswitch.org:3478' }, // FreeSWITCH (欧洲)
        
        // Configuring fallback TURN servers (credentials would need to be provided in production)
        // These are commented out but can be enabled with proper credentials
        /*
        {
          urls: 'turn:turn.example.com:3478?transport=tcp',
          username: 'your_username',
          credential: 'your_password'
        },
        {
          urls: 'turns:turn.example.com:443?transport=tcp',
          username: 'your_username',
          credential: 'your_password'
        }
        */
      ],
      iceTransportPolicy: 'all', // 尝试所有类型的连接
      bundlePolicy: 'max-compat', // 最大兼容性
      rtcpMuxPolicy: 'require', // 要求RTCP复用
      sdpSemantics: 'unified-plan' // 使用统一计划，更好的兼容性
    },
    // 使用全球分布的PeerJS服务器
    host: getBestPeerJSServer(),
    port: 443,
    secure: true,
    path: '/secure-channel', // 使用特定路径避免与其他PeerJS应用冲突
    debug: 1
  };

  peer = new Peer('sc2-' + myCode, peerOptions);

  peer.on('open', () => {
    reconnectAttempts = 0; // 重置重连计数
    setStatus('', 'READY');
    setLog('Listening on code: ' + myCode + '  — waiting for peer', 'var(--green)');
    document.getElementById('waiting').style.display = 'flex';
  });

  peer.on('connection', incomingConn => {
    if (conn) { incomingConn.close(); return; }
    conn = incomingConn;
    setupConn();
  });

  peer.on('error', err => {
    console.error("PeerJS Error:", err);
    
    if (err.type === 'unavailable-id') {
      // 如果ID不可用，尝试重新初始化
      setTimeout(() => {
        if (peer) {
          peer.destroy();
        }
        initPeer();
      }, 1000);
      return;
    }
    
    if (err.type === 'network-error' || err.type === 'server-error') {
      // 如果是网络或服务器错误，尝试重连
      if (reconnectAttempts < maxReconnectAttempts) {
        reconnectAttempts++;
        setLog(`Connection failed, attempting to reconnect (${reconnectAttempts}/${maxReconnectAttempts})...`, 'var(--amber)');
        
        setTimeout(() => {
          if (peer) {
            peer.destroy();
          }
          initPeer();
        }, 2000 * reconnectAttempts); // 逐步增加延迟
        
        return;
      }
    }
    
    setStatus('err', 'ERROR');
    setLog('Relay error: ' + err.message, 'var(--red)');
  });
}

// 添加一个新的函数，用于创建可共享的连接信息
function createAlternativeSignalingInfo() {
  if (!peer || !peer.id) {
    alert('Peer connection not ready yet.');
    return;
  }
  
  // 创建包含连接信息的对象
  const signalingInfo = {
    peerId: peer.id,
    publicKey: myPubB64Cached,
    timestamp: Date.now()
  };
  
  // 编码为易于共享的格式
  const encodedInfo = btoa(JSON.stringify(signalingInfo));
  const shareLink = `${window.location.href}#connect=${encodedInfo}`;
  
  // 复制到剪贴板
  navigator.clipboard.writeText(shareLink).then(() => {
    toast('ALTERNATIVE SIGNALING INFO COPIED');
  }).catch(err => {
    console.error('Could not copy text: ', err);
    toast('FAILED TO COPY SIGNALLING INFO');
  });
}

// 更新复制代码功能，也复制替代信令信息
function copyCode() {
  // 如果已有完整信令信息，则使用替代方式
  if (myPubB64Cached) {
    createAlternativeSignalingInfo();
  } else {
    // 否则复制代码
    navigator.clipboard.writeText(myCode)
      .then(() => toast('CODE COPIED'))
      .catch(() => toast('SELECT AND COPY MANUALLY'));
  }
}

// ═══════════════════════════════════════════════════
// JOIN
// ═══════════════════════════════════════════════════
function doJoin() {
  const val = document.getElementById('join-input').value.trim().toUpperCase();
  if (val.length !== 6) { 
    setLog('Enter a valid 6-character code', 'var(--red)'); 
    return; 
  }
  if (val === myCode) { 
    setLog('Cannot connect to your own code', 'var(--red)'); 
    return; 
  }

  setLog('Connecting to ' + val + '…', 'var(--amber)');
  setStatus('connecting', 'CONNECTING');

  // 使用增强的连接选项
  conn = peer.connect('sc2-' + val, {
    reliable: true, 
    serialization: 'json',
    // 设置更长的超时时间
    negotiationTimeout: 15000
  });
  
  // 添加连接事件处理
  conn.on('error', err => {
    console.error('Connection error:', err);
    
    // 尝试重新连接
    if (conn.open === false) {
      setTimeout(() => {
        if (conn && conn.open === false) {
          setLog('Retrying connection...', 'var(--amber)');
          
          // 重新创建连接
          conn = peer.connect('sc2-' + val, {
            reliable: true, 
            serialization: 'json',
            negotiationTimeout: 20000 // 更长的超时时间
          });
          setupConn();
        }
      }, 3000);
    }
  });
  
  setupConn();
}

// ═══════════════════════════════════════════════════
// CONNECTION LIFECYCLE
// ═══════════════════════════════════════════════════
let myPubB64Cached = '';

function setupConn() {
  conn.on('open', async () => {
    setStatus('connecting', 'KEY EXCHANGE');
    setLog('Connection established — performing key exchange…', 'var(--amber)');
    myPubB64Cached = await exportPub(myKeyPair);
    send({type:'key_exchange', pub: myPubB64Cached});
  });

  conn.on('data', async data => {
    if (!data || !data.type) return;

    if (data.type === 'key_exchange') {
      try {
        const peerPub = await importPub(data.pub);
        sharedKey = await deriveKey(myKeyPair, peerPub);
        const fp = await fingerprint(myPubB64Cached, data.pub);
        document.getElementById('fp-display').textContent = 'FP ' + fp;

        setStatus('on', 'SECURE');
        showChat();
        addMsg('SYS', 'Secure channel established. Messages encrypted end-to-end.', 'sys');
        addMsg('SYS', 'Key fingerprint: ' + fp + '  — verify this matches peer\'s display out-of-band.', 'sys');
        addDivider();
      } catch(e) {
        setLog('Key exchange failed: ' + e.message, 'var(--red)');
        setStatus('err', 'KEY EXCHANGE FAILED');
      }
      return;
    }

    if (!sharedKey) return;

    if (data.type === 'msg') {
      try {
        const plain = await decrypt(sharedKey, data.payload);
        addMsg('PEER', plain);
        setTyping(false);
      } catch(e) {
        addMsg('SYS', '[Decryption error — message dropped]', 'sys');
      }
    }
    if (data.type === 'typing') setTyping(data.on);
    if (data.type === 'bye') {
      addDivider();
      addMsg('SYS', 'Peer disconnected gracefully.', 'sys');
      setStatus('err', 'DISCONNECTED');
      sharedKey = null;
    }
  });

  conn.on('close', () => {
    if (sharedKey) {
      addDivider();
      addMsg('SYS', 'Connection closed.', 'sys');
    }
    sharedKey = null;
    setStatus('err', 'DISCONNECTED');
  });

  conn.on('error', err => {
    setLog('Connection error: ' + err.message, 'var(--red)');
    setStatus('err', 'ERROR');
  });
}

function send(obj) {
  if (conn && conn.open) conn.send(obj);
}

// ═══════════════════════════════════════════════════
// SEND MESSAGE
// ═══════════════════════════════════════════════════
async function sendMsg() {
  if (!sharedKey) return;
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text) return;
  try {
    const payload = await encrypt(sharedKey, text);
    send({type:'msg', payload});
    addMsg('YOU', text);
    inp.value = '';
    inp.style.height = 'auto';
    send({type:'typing', on: false});
    clearTimeout(typingOutTimer);
    lastTypingSent = false;
  } catch(e) {
    toast('ENCRYPTION ERROR');
  }
}

// ═══════════════════════════════════════════════════
// TYPING INDICATOR
// ═══════════════════════════════════════════════════
function handleTyping() {
  const inp = document.getElementById('msg-input');
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 110) + 'px';
  if (!sharedKey) return;
  if (!lastTypingSent) { send({type:'typing', on:true}); lastTypingSent = true; }
  clearTimeout(typingOutTimer);
  typingOutTimer = setTimeout(() => {
    send({type:'typing', on:false});
    lastTypingSent = false;
  }, 2200);
}

function setTyping(on) {
  document.getElementById('typing-row').textContent = on ? 'PEER is typing…' : '';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

// ═══════════════════════════════════════════════════
// DISCONNECT
// ═══════════════════════════════════════════════════
function doDisconnect() {
  if (conn) {
    try { send({type:'bye'}); } catch(_) {}
    conn.close();
    conn = null;
  }
  sharedKey = null;
  document.getElementById('chat').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
  document.getElementById('disc-btn').classList.add('hidden');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('typing-row').textContent = '';
  document.getElementById('waiting').style.display = 'none';
  setStatus('', 'READY');
  setLog('Disconnected. Listening on code: ' + myCode, 'var(--text-dim)');
  document.getElementById('waiting').style.display = 'flex';
}

// ═══════════════════════════════════════════════════
// SHOW CHAT
// ═══════════════════════════════════════════════════
function showChat() {
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('chat').classList.remove('hidden');
  document.getElementById('disc-btn').classList.remove('hidden');
  setTimeout(() => document.getElementById('msg-input').focus(), 100);
}

// ═══════════════════════════════════════════════════
// INPUT FILTER
// ═══════════════════════════════════════════════════
document.getElementById('join-input').addEventListener('input', function() {
  this.value = this.value.toUpperCase().replace(/[^A-Z2-9]/g, '');
});
document.getElementById('join-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doJoin();
});

// ═══════════════════════════════════════════════════
// BOOTSTRAP
// ═══════════════════════════════════════════════════
(async () => {
  try {
    myKeyPair = await genKeyPair();
    runBoot(async () => {
      hideBoot();
      await initPeer();
    });
  } catch (error) {
    console.error('Initialization error:', error);
    // 如果初始化失败，也显示设置界面，让用户可以看到错误信息
    const b = document.getElementById('boot');
    b.classList.add('hidden');
    document.getElementById('setup').classList.remove('hidden');
  }
})();
</script>
